<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050e1f"/>
      <stop offset="100%" style="stop-color:#0f1f3a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ec951"/>
      <stop offset="100%" style="stop-color:#1a7a2e"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <circle cx="16" cy="16" r="13" fill="none" stroke="#c8960c" stroke-width="1"/>
  <!-- Leaf -->
  <ellipse cx="16" cy="14" rx="5.5" ry="8" fill="url(#leaf)" transform="rotate(-10 16 14)"/>
  <!-- Vein -->
  <line x1="16" y1="7" x2="16" y2="22" stroke="#1a5020" stroke-width="0.8"/>
  <!-- Stem -->
  <line x1="16" y1="22" x2="16" y2="26" stroke="#c8960c" stroke-width="1.2"/>
  <!-- Gold dots -->
  <circle cx="10" cy="13" r="1" fill="#f5c842" opacity="0.8"/>
  <circle cx="22" cy="11" r="0.8" fill="#f5c842" opacity="0.7"/>
  <circle cx="9" cy="20" r="0.7" fill="#f5c842" opacity="0.6"/>
</svg>