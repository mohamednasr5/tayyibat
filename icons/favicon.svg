<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#050e1f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8960c"/>
      <stop offset="100%" style="stop-color:#f5c842"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7a2e"/>
      <stop offset="100%" style="stop-color:#2ec951"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>

  <!-- Outer gold ring -->
  <rect x="1.28" y="1.28" width="29.44" height="29.44"
        rx="5.95" ry="5.95"
        fill="none" stroke="url(#gold)" stroke-width="0.576" opacity="0.4"/>

  <!-- Inner subtle ring -->
  <rect x="2.88" y="2.88" width="26.24" height="26.24"
        rx="4.55" ry="4.55"
        fill="none" stroke="url(#gold)" stroke-width="0.256" opacity="0.2"/>

  <!-- Decorative corner dots -->
  <circle cx="6.4" cy="6.4" r="0.576" fill="#c8960c" opacity="0.5"/>
  <circle cx="25.6" cy="6.4" r="0.576" fill="#c8960c" opacity="0.5"/>
  <circle cx="6.4" cy="25.6" r="0.576" fill="#c8960c" opacity="0.5"/>
  <circle cx="25.6" cy="25.6" r="0.576" fill="#c8960c" opacity="0.5"/>

  <!-- Main leaf/plant - stylized -->
  <!-- Stem -->
  <line x1="16" y1="24.0" x2="16" y2="12.16"
        stroke="url(#green)" stroke-width="1.44" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Big center leaf -->
  <ellipse cx="16" cy="13.44" rx="7.04" ry="4.8"
           fill="url(#green)" opacity="0.95" filter="url(#glow)"/>

  <!-- Leaf vein -->
  <line x1="10.24" y1="13.44" x2="21.759999999999998" y2="13.44"
        stroke="#1a7a2e" stroke-width="0.384" opacity="0.6"/>

  <!-- Left branch leaf -->
  <ellipse cx="10.24" cy="17.6" rx="4.16" ry="2.72"
           fill="url(#green)" opacity="0.85" transform="rotate(-35, 10.24, 17.6)"/>

  <!-- Right branch leaf -->
  <ellipse cx="21.76" cy="17.6" rx="4.16" ry="2.72"
           fill="url(#green)" opacity="0.85" transform="rotate(35, 21.76, 17.6)"/>

  <!-- Branch left -->
  <line x1="16" y1="18.56" x2="10.24" y2="16.64"
        stroke="url(#green)" stroke-width="0.96" stroke-linecap="round" opacity="0.8"/>

  <!-- Branch right -->
  <line x1="16" y1="18.56" x2="21.76" y2="16.64"
        stroke="url(#green)" stroke-width="0.96" stroke-linecap="round" opacity="0.8"/>

  <!-- Gold crescent/arc above plant -->
  <path d="M 10.24 8.96 Q 16 5.76 21.759999999999998 8.96"
        fill="none" stroke="url(#gold)" stroke-width="0.96" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Gold star dot above crescent -->
  <circle cx="16" cy="6.4" r="0.896" fill="url(#gold)" filter="url(#glow)"/>

  <!-- Small sparkle left -->
  <circle cx="7.68" cy="11.2" r="0.384" fill="#f5c842" opacity="0.7"/>
  <!-- Small sparkle right -->
  <circle cx="24.32" cy="11.2" r="0.384" fill="#f5c842" opacity="0.7"/>

  <!-- Bottom text area glow -->
  <rect x="4.8" y="24.96" width="22.4" height="3.84"
        rx="0.96" fill="url(#gold)" opacity="0.08"/>
</svg>