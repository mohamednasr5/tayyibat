<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تطبيق طيبات - اكتشف أفضل الأطباق والوصفات الشهية">
    <meta name="theme-color" content="#FF6B6B">
    <title>طيبات - Tayyibat</title>
    
    <!-- Manifest for PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23FF6B6B' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='white' text-anchor='middle' dy='.3em' font-family='Arial, sans-serif' font-weight='bold'>ط</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23FF6B6B' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='white' text-anchor='middle' dy='.3em' font-family='Arial, sans-serif' font-weight='bold'>ط</text></svg>">
    
    <!-- Styles -->
    <link rel="stylesheet" href="animations.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFE66D;
            --dark-bg: #1a1a1a;
            --light-bg: #f8f8f8;
            --text-dark: #333;
            --text-light: #999;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light-bg);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
            animation: fadeIn 0.8s ease-out;
        }

        header p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Search Bar */
        .search-section {
            margin: 30px 0;
            animation: slideUp 0.6s ease-out;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid var(--primary-color);
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-bar input:focus {
            box-shadow: 0 0 10px var(--primary-color);
        }

        .search-bar button {
            padding: 12px 30px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .search-bar button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            background: #ff5252;
        }

        /* Category Filter */
        .category-filter {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 30px;
            scroll-behavior: smooth;
        }

        .category-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--text-dark);
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        /* Recipes Grid */
        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .recipe-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            animation: fadeIn 0.6s ease-out;
        }

        .recipe-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .recipe-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .recipe-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0);
            transition: background 0.3s ease;
        }

        .recipe-card:hover .recipe-image::after {
            background: rgba(0, 0, 0, 0.2);
        }

        .recipe-info {
            padding: 20px;
        }

        .recipe-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        .recipe-description {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .recipe-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .recipe-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .recipe-rating {
            color: var(--accent-color);
            font-weight: bold;
        }

        .recipe-actions {
            display: flex;
            gap: 10px;
        }

        .recipe-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-view {
            background: var(--primary-color);
            color: white;
        }

        .btn-view:hover {
            background: #ff5252;
            transform: translateX(-3px);
        }

        .btn-save {
            background: var(--accent-color);
            color: var(--text-dark);
        }

        .btn-save:hover {
            background: #ffd54f;
            transform: translateX(3px);
        }

        /* Loading Spinner */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid var(--light-bg);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Footer */
        footer {
            background: var(--dark-bg);
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
        }

        footer p {
            margin-bottom: 10px;
        }

        footer a {
            color: var(--secondary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--primary-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .recipes-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .search-bar {
                flex-direction: column;
            }

            .category-filter {
                justify-content: center;
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--light-bg);
            padding-bottom: 15px;
        }

        .modal-header h2 {
            margin: 0;
            color: var(--primary-color);
        }

        .close {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-light);
            cursor: pointer;
            background: none;
            border: none;
        }

        .close:hover {
            color: var(--text-dark);
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--secondary-color);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 2000;
        }

        .notification.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
            }
            to {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>🍳 طيبات</h1>
        <p>اكتشف أفضل الوصفات والأطباق الشهية</p>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Search Section -->
        <div class="search-section">
            <div class="search-bar">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="ابحث عن وصفة..."
                    class="fade-in"
                >
                <button id="searchBtn" class="fade-in">بحث</button>
            </div>

            <!-- Category Filter -->
            <div class="category-filter" id="categoryFilter">
                <button class="category-btn active" data-category="all">الكل</button>
                <button class="category-btn" data-category="appetizers">المقبلات</button>
                <button class="category-btn" data-category="mains">الأطباق الرئيسية</button>
                <button class="category-btn" data-category="desserts">الحلويات</button>
                <button class="category-btn" data-category="drinks">المشروبات</button>
                <button class="category-btn" data-category="salads">السلطات</button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>جاري التحميل...</p>
        </div>

        <!-- Recipes Grid -->
        <div class="recipes-grid" id="recipesGrid"></div>
    </div>

    <!-- Recipe Detail Modal -->
    <div class="modal" id="recipeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close" id="closeModal">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 طيبات - Tayyibat. جميع الحقوق محفوظة</p>
        <p><a href="#about">عن التطبيق</a> | <a href="#contact">اتصل بنا</a> | <a href="#privacy">سياسة الخصوصية</a></p>
    </footer>

    <!-- Scripts -->
    <script src="advanced-ai.js"></script>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker registered:', registration);
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }

        // Sample Recipe Data
        const recipes = [
            {
                id: 1,
                title: 'حمص بطحينة',
                category: 'appetizers',
                description: 'حمص كريمي مع طحينة وثوم وليمون طازج',
                emoji: '🫘',
                time: '10 دقائق',
                difficulty: 'سهل',
                rating: 4.5,
                reviews: 125,
                ingredients: ['حمص', 'طحينة', 'ثوم', 'ليمون', 'ملح'],
                steps: ['نسلق الحمص', 'نخلط مع الطحينة', 'نضيف الثوم والليمون', 'نتبل ونقدم']
            },
            {
                id: 2,
                title: 'الكبة',
                category: 'appetizers',
                description: 'كبة سورية لذيذة محشوة باللحم والبندورة',
                emoji: '🍖',
                time: '45 دقيقة',
                difficulty: 'متوسط',
                rating: 4.8,
                reviews: 89,
                ingredients: ['برغل', 'لحم', 'بندورة', 'بصل', 'توابل'],
                steps: ['نخلط البرغل مع اللحم', 'نشكل الحبات', 'نحشو بخليط اللحم', 'نقلي ونقدم']
            },
            {
                id: 3,
                title: 'تبولة لبنانية',
                category: 'salads',
                description: 'سلطة تبولة طازجة بالبقدونس والنعناع',
                emoji: '🥗',
                time: '15 دقيقة',
                difficulty: 'سهل',
                rating: 4.6,
                reviews: 156,
                ingredients: ['بقدونس', 'نعناع', 'برغل', 'بندورة', 'زيت زيتون'],
                steps: ['نفرم البقدونس والنعناع', 'نخلط مع البرغل', 'نضيف البندورة', 'نتبل ونقدم']
            },
            {
                id: 4,
                title: 'محمرة',
                category: 'appetizers',
                description: 'محمرة لذيذة من الفلفل والجوز والرمان',
                emoji: '🫑',
                time: '20 دقيقة',
                difficulty: 'متوسط',
                rating: 4.4,
                reviews: 98,
                ingredients: ['فلفل أحمر', 'جوز', 'رمان', 'زيت زيتون', 'خبز'],
                steps: ['نشوي الفلفل', 'نقشر ونخلط مع الجوز', 'نضيف عصير الرمان', 'نقدم']
            },
            {
                id: 5,
                title: 'الفتوش',
                category: 'salads',
                description: 'سلطة فتوش بالخضار والرمان واللبنة',
                emoji: '🥙',
                time: '20 دقيقة',
                difficulty: 'سهل',
                rating: 4.7,
                reviews: 132,
                ingredients: ['خس', 'بندورة', 'خيار', 'رمان', 'خبز'],
                steps: ['نقطع الخضار', 'نقسقس الخبز', 'نخلط المكونات', 'نضيف الصلصة', 'نقدم']
            },
            {
                id: 6,
                title: 'كنافة بالقشدة',
                category: 'desserts',
                description: 'كنافة ناعمة بالقشدة والمكسرات والعسل',
                emoji: '🍯',
                time: '60 دقيقة',
                difficulty: 'متوسط',
                rating: 4.9,
                reviews: 201,
                ingredients: ['كنافة', 'قشدة', 'جوز', 'عسل', 'ماء ورد'],
                steps: ['نفرد الكنافة', 'نضيف القشدة والمكسرات', 'نخبز', 'نسقي بالعسل']
            },
            {
                id: 7,
                title: 'شاي بالنعناع',
                category: 'drinks',
                description: 'شاي منعش بالنعناع الطازج والسكر',
                emoji: '🍵',
                time: '5 دقائق',
                difficulty: 'سهل',
                rating: 4.5,
                reviews: 78,
                ingredients: ['نعناع', 'ماء', 'سكر', 'شاي'],
                steps: ['نغلي الماء', 'نضيف الشاي والنعناع', 'نترك 3 دقائق', 'نقدم']
            },
            {
                id: 8,
                title: 'صيادية السمك',
                category: 'mains',
                description: 'سمك مشوي مع أرز أبيض وصلصة الطماطم',
                emoji: '🐟',
                time: '35 دقيقة',
                difficulty: 'متوسط',
                rating: 4.8,
                reviews: 145,
                ingredients: ['سمك', 'أرز', 'طماطم', 'ثوم', 'توابل'],
                steps: ['نش وي السمك', 'نطبخ الأرز', 'نحضر الصلصة', 'نقدم معا']
            }
        ];

        let currentCategory = 'all';

        // Initialize
        function init() {
            displayRecipes();
            setupEventListeners();
        }

        // Display recipes based on category
        function displayRecipes() {
            const grid = document.getElementById('recipesGrid');
            grid.innerHTML = '';

            const filtered = currentCategory === 'all' 
                ? recipes 
                : recipes.filter(r => r.category === currentCategory);

            filtered.forEach((recipe, index) => {
                const card = createRecipeCard(recipe);
                grid.appendChild(card);
            });
        }

        // Create recipe card
        function createRecipeCard(recipe) {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.innerHTML = `
                <div class="recipe-image">
                    ${recipe.emoji}
                </div>
                <div class="recipe-info">
                    <h3 class="recipe-title">${recipe.title}</h3>
                    <p class="recipe-description">${recipe.description}</p>
                    <div class="recipe-meta">
                        <span>⏱️ ${recipe.time}</span>
                        <span>📊 ${recipe.difficulty}</span>
                        <span class="recipe-rating">⭐ ${recipe.rating} (${recipe.reviews})</span>
                    </div>
                    <div class="recipe-actions">
                        <button class="btn-view" onclick="viewRecipe(${recipe.id})">عرض الوصفة</button>
                        <button class="btn-save" onclick="saveRecipe(${recipe.id})">💾 حفظ</button>
                    </div>
                </div>
            `;
            return card;
        }

        // View recipe details
        function viewRecipe(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;

            document.getElementById('modalTitle').textContent = recipe.title;
            document.getElementById('modalBody').innerHTML = `
                <div style="margin-bottom: 20px;">
                    <div style="font-size: 4rem; text-align: center; margin-bottom: 20px;">${recipe.emoji}</div>
                    
                    <h3 style="color: var(--primary-color); margin-bottom: 10px;">المكونات:</h3>
                    <ul style="list-style: none; padding: 10px;">
                        ${recipe.ingredients.map(ing => `<li style="padding: 5px;">✓ ${ing}</li>`).join('')}
                    </ul>
                    
                    <h3 style="color: var(--primary-color); margin-bottom: 10px; margin-top: 20px;">طريقة التحضير:</h3>
                    <ol style="padding: 10px; padding-right: 25px;">
                        ${recipe.steps.map(step => `<li style="padding: 5px;">${step}</li>`).join('')}
                    </ol>
                    
                    <div style="background: var(--light-bg); padding: 15px; border-radius: 8px; margin-top: 20px;">
                        <p><strong>الوقت:</strong> ${recipe.time}</p>
                        <p><strong>الصعوبة:</strong> ${recipe.difficulty}</p>
                        <p><strong>التقييم:</strong> ⭐${recipe.rating}/5 (${recipe.reviews} تقييم)</p>
                    </div>
                </div>
            `;

            document.getElementById('recipeModal').classList.add('active');
        }

        // Save recipe
        function saveRecipe(id) {
            const recipe = recipes.find(r => r.id === id);
            showNotification(`تم حفظ وصفة ${recipe.title} بنجاح! 💾`);
        }

        // Show notification
        function showNotification(message) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.classList.add('active');
            setTimeout(() => {
                notif.classList.remove('active');
            }, 3000);
        }

        // Setup event listeners
        function setupEventListeners() {
            // Category filter
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategory = e.target.dataset.category;
                    displayRecipes();
                });
            });

            // Search
            document.getElementById('searchBtn').addEventListener('click', search);
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') search();
            });

            // Modal
            document.getElementById('closeModal').addEventListener('click', () => {
                document.getElementById('recipeModal').classList.remove('active');
            });

            document.getElementById('recipeModal').addEventListener('click', (e) => {
                if (e.target.id === 'recipeModal') {
                    document.getElementById('recipeModal').classList.remove('active');
                }
            });
        }

        // Search functionality
        function search() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (!searchTerm) {
                displayRecipes();
                return;
            }

            const grid = document.getElementById('recipesGrid');
            grid.innerHTML = '';

            const filtered = recipes.filter(r => 
                r.title.includes(searchTerm) || 
                r.description.includes(searchTerm)
            );

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-light);">لم يتم العثور على نتائج</p>';
                return;
            }

            filtered.forEach(recipe => {
                const card = createRecipeCard(recipe);
                grid.appendChild(card);
            });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
