<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طيبات Pro | النظام الصحي الذكي</title>
    <!-- استيراد الخطوط والـ FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #c8960c; --gold2: #f5c842; --bg: #050e1f; --pro-gradient: linear-gradient(135deg, #c8960c, #f5c842); }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        
        /* تأثيرات الـ Pro */
        .pro-badge { background: var(--pro-gradient); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: 900; font-size: 0.7rem; margin-right: 5px; }
        .glow-effect { box-shadow: 0 0 15px rgba(200,150,12,0.5); border: 1px solid var(--gold); }
        
        /* الأنيميشن البصري */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .anim-pro { animation: pulse 3s infinite; }

        /* صفحة المستخدم */
        .profile-header { text-align: center; padding: 20px; }
        .camera-btn { background: var(--pro-gradient); padding: 15px; border-radius: 50%; width: 60px; height: 60px; margin: 20px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        /* لوحة التحكم والاشتراك */
        .pro-cta-card { background: linear-gradient(145deg, #0d1e38, #112244); padding: 20px; border-radius: 20px; margin: 20px; border: 1px solid var(--gold); text-align: center; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- صفحة الملف الشخصي المحدثة -->
<div id="profile-page" class="page">
    <div class="profile-header">
        <h1 id="user-display">مرحباً، محمد نصر حماد <span class="pro-badge hidden" id="pro-tag">PRO 🌤️</span></h1>
        
        <!-- ماسح الكاميرا للمنتجات (يظهر للمشتركين فقط) -->
        <div id="pro-camera-section" class="hidden">
            <div class="camera-btn anim-pro" onclick="openProductScanner()">
                <i class="fas fa-camera"></i>
            </div>
            <p>افتح الكاميرا لمسح المنتج</p>
        </div>
    </div>

    <!-- بطاقة اشتراك البرو (تحث المستخدم) -->
    <div id="upgrade-cta" class="pro-cta-card anim-pro">
        <h2>👑 اشترِ النسخة البرو</h2>
        <p>احصل على خطط غذائية يومية، AI Coach، وماسح المنتجات!</p>
        <button onclick="subscribePro()" style="padding: 10px 20px; border-radius: 10px; border: none; background: var(--gold); font-weight: 900;">اشترك الآن</button>
    </div>
</div>

<!-- AI Coach & Dashboard Section -->
<div id="ai-coach-section" class="hidden">
    <div class="pro-cta-card">
        <h3>🔥 مساعدك الذكي AI Coach</h3>
        <input type="text" id="ai-input" placeholder="هل الموز مسموح؟">
        <button onclick="askAI()">اسأل</button>
        <div id="ai-response"></div>
    </div>
</div>

<script>
    // بيانات المستخدم (محاكاة)
    let user = {
        name: "محمد نصر حماد",
        isPro: false // قم بتغييرها لـ true لتفعيل كافة مميزات البرو
    };

    function initApp() {
        if (user.isPro) {
            document.getElementById('pro-tag').classList.remove('hidden');
            document.getElementById('pro-camera-section').classList.remove('hidden');
            document.getElementById('ai-coach-section').classList.remove('hidden');
            document.getElementById('upgrade-cta').classList.add('hidden');
        }
    }

    // وظيفة ماسح الكاميرا
    function openProductScanner() {
        alert("جارٍ تشغيل الكاميرا لتحليل المنتج...");
        // هنا يتم دمج كود الـ WebRTC لفتح الكاميرا
    }

    // وظيفة الـ AI Coach
    function askAI() {
        const question = document.getElementById('ai-input').value;
        document.getElementById('ai-response').innerText = "جاري تحليل إجابتك حسب قواعد الطيبات...";
    }

    function subscribePro() {
        alert("تحويلك إلى واتساب للاشتراك في النسخة البرو...");
    }

    window.onload = initApp;
</script>

</body>
</html>
