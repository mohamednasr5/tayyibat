<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF6B6B">
    <meta name="description" content="تطبيق طيبات - نظام صحي ذكي للتغذية والصيام المتقطع">
    <title>طيبات - نظام صحي ذكي</title>
    <link rel="manifest" href="manifest.json">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
            --light: #ECF0F1;
            --success: #27AE60;
            --warning: #F39C12;
            --danger: #E74C3C;
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark);
            overflow-x: hidden;
        }

        /* === الشريط العلوي === */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #FF5252 100%);
            color: white;
            padding: 20px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 32px;
            animation: iconFloat 2s ease-in-out infinite;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
        }

        /* === المحتوى الرئيسي === */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* === نموذج التسجيل === */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--light);
        }

        .modal-header h2 {
            color: var(--primary);
            font-size: 24px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--dark);
            transition: transform 0.3s;
        }

        .close-btn:hover {
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--light);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        .checkbox-group,
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-item,
        .radio-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkbox-item:hover,
        .radio-item:hover {
            background: var(--light);
        }

        .checkbox-item input,
        .radio-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        /* === شبكة البطاقات === */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            border-color: var(--primary);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .card-icon {
            font-size: 32px;
            animation: iconPulse 2s ease-in-out infinite;
        }

        .card-title {
            color: var(--primary);
            font-size: 18px;
            font-weight: 600;
        }

        .card-content {
            color: var(--dark);
            line-height: 1.6;
            font-size: 14px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .card-actions .btn {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
        }

        /* === الشريط الجانبي === */
        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .sidebar-title {
            color: var(--primary);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--light);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--dark);
            font-size: 14px;
        }

        .stat-value {
            color: var(--primary);
            font-weight: 600;
            font-size: 16px;
        }

        /* === المحتوى الديناميكي === */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--light);
        }

        .tab {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: var(--dark);
            transition: all 0.3s;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab:hover {
            color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* === نصائح صحية === */
        .health-tips {
            background: linear-gradient(135deg, var(--accent) 0%, #FFD93D 100%);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            color: var(--dark);
        }

        .health-tips h3 {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .tip-item {
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
        }

        .tip-item:last-child {
            border-bottom: none;
        }

        .tip-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        /* === الرسوم المتحركة === */
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* === الاستجابة === */
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }

            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .nav-buttons {
                width: 100%;
            }

            .nav-buttons .btn {
                flex: 1;
            }

            .modal-content {
                padding: 20px;
            }

            .logo {
                font-size: 22px;
            }
        }

        /* === حالات خاصة === */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--dark);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-message {
            background: var(--success);
            color: white;
            padding: 15px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- الشريط العلوي -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🍳</span>
                <span>طيبات الصحي</span>
            </div>
            <div class="nav-buttons">
                <button class="btn btn-outline" onclick="showProfileModal()">👤 بيانات الملف الشخصي</button>
                <button class="btn btn-secondary" onclick="app.toggleDarkMode()">🌙 المظهر</button>
            </div>
        </div>
    </header>

    <!-- المحتوى الرئيسي -->
    <main class="container">
        <!-- قسم الترحيب والإحصائيات -->
        <div class="cards-grid" style="grid-template-columns: 1fr;">
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">👋</span>
                    <div>
                        <div class="card-title">أهلاً وسهلاً</div>
                        <p id="welcomeMessage" style="color: #666; font-size: 14px;"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- الأقسام الرئيسية -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('recipes')">🍽️ الوصفات</button>
            <button class="tab" onclick="switchTab('ingredients')">🥬 تحليل المكونات</button>
            <button class="tab" onclick="switchTab('health')">🏥 الصحة</button>
            <button class="tab" onclick="switchTab('settings')">⚙️ الإعدادات</button>
        </div>

        <!-- تبويب الوصفات -->
        <div id="recipes" class="tab-content active">
            <div class="cards-grid" id="recipesGrid">
                <!-- سيتم ملؤه ديناميكياً -->
            </div>
        </div>

        <!-- تبويب تحليل المكونات -->
        <div id="ingredients" class="tab-content">
            <div class="card">
                <h3>حلل المكونات المتاحة لديك</h3>
                <div class="form-group">
                    <label>أدخل المكونات المتاحة (فاصلة بين كل مكون):</label>
                    <textarea id="ingredientInput" placeholder="مثال: دجاج، طماطم، جزر، زيت زيتون" rows="5"></textarea>
                </div>
                <button class="btn btn-primary" onclick="analyzeIngredients()">🔍 حلل المكونات</button>
                <div id="analysisResult"></div>
            </div>
        </div>

        <!-- تبويب الصحة -->
        <div id="health" class="tab-content">
            <div class="sidebar">
                <div class="sidebar-title">📊 إحصائياتك الصحية</div>
                <div id="healthStats"></div>
            </div>

            <div class="health-tips">
                <h3>💡 نصائح صحية مخصصة</h3>
                <div id="healthTips"></div>
            </div>

            <div class="card">
                <h3>📅 خطتك اليومية</h3>
                <div id="dailyPlan"></div>
            </div>
        </div>

        <!-- تبويب الإعدادات -->
        <div id="settings" class="tab-content">
            <div class="card">
                <h3>⚙️ الإعدادات</h3>
                <div class="form-group">
                    <label>خطة الصيام المتقطع:</label>
                    <select id="ifPlanSelect" onchange="updateIFPlan()">
                        <option value="IF_16_8">16:8 الصيام المتقطع</option>
                        <option value="IF_18_6">18:6 الصيام المتقطع</option>
                        <option value="IF_20_4">20:4 الصيام المتقطع</option>
                        <option value="KETO_20_4">كيتو 20:4</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="ketoToggle" onchange="toggleKeto()"> تفعيل نظام كيتو
                    </label>
                </div>
                <button class="btn btn-primary" onclick="exportHealthReport()">📥 تصدير التقرير</button>
                <button class="btn btn-outline" onclick="resetAllData()">🔄 إعادة تعيين البيانات</button>
            </div>
        </div>
    </main>

    <!-- نموذج تحرير البيانات الشخصية -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>👤 بيانات الملف الشخصي</h2>
                <button class="close-btn" onclick="closeProfileModal()">✕</button>
            </div>

            <form id="profileForm">
                <!-- المعلومات الأساسية -->
                <div class="form-group">
                    <label>الاسم:</label>
                    <input type="text" id="nameInput" placeholder="أدخل اسمك">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>العمر:</label>
                        <input type="number" id="ageInput" min="1" max="120">
                    </div>
                    <div class="form-group">
                        <label>النوع:</label>
                        <select id="genderSelect">
                            <option value="male">ذكر</option>
                            <option value="female">أنثى</option>
                        </select>
                    </div>
                </div>

                <!-- القياسات الجسدية -->
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>الوزن (كغ):</label>
                        <input type="number" id="weightInput" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>الطول (سم):</label>
                        <input type="number" id="heightInput">
                    </div>
                    <div class="form-group">
                        <label>مستوى النشاط:</label>
                        <select id="activitySelect">
                            <option value="sedentary">قليل جداً</option>
                            <option value="light">قليل</option>
                            <option value="moderate">معتدل</option>
                            <option value="active">مرتفع</option>
                            <option value="veryActive">مرتفع جداً</option>
                        </select>
                    </div>
                </div>

                <!-- الأمراض -->
                <div class="form-group">
                    <label>الأمراض والحالات الصحية:</label>
                    <div class="checkbox-group" id="diseasesCheckboxes"></div>
                </div>

                <!-- الحساسيات -->
                <div class="form-group">
                    <label>الحساسيات الغذائية:</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" name="allergy" value="gluten"> الغلوتين
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="allergy" value="dairy"> منتجات الألبان
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="allergy" value="nuts"> المكسرات
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="allergy" value="shellfish"> المحار
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="allergy" value="soy"> فول الصويا
                        </label>
                    </div>
                </div>

                <!-- الهدف -->
                <div class="form-group">
                    <label>الهدف الصحي:</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="goal" value="lose"> خسارة الوزن
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="goal" value="maintain"> الحفاظ على الوزن
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="goal" value="gain"> اكتساب الوزن
                        </label>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn btn-primary" style="flex: 1;" onclick="saveProfile()">💾 حفظ البيانات</button>
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeProfileModal()">❌ إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <!-- تحميل البرامج النصية -->
    <script src="health-ai-system.js"></script>
    <script src="advanced-3d-animations.js"></script>
    
    <script>
        /**
         * تطبيق طيبات الرئيسي
         */
        class TayyibatApp {
            constructor() {
                this.healthAI = new HealthAISystem();
                this.animations = new Advanced3DAnimations();
                this.initialize();
            }

            initialize() {
                this.loadProfileData();
                this.setupUI();
                this.loadRecipes();
                this.updateWelcome();
                this.registerServiceWorker();
                this.applyAnimations();
            }

            setupUI() {
                this.populateDiseaseCheckboxes();
                this.updateProfileForm();
                this.updateHealthDisplay();
            }

            populateDiseaseCheckboxes() {
                const container = document.getElementById('diseasesCheckboxes');
                const diseases = this.healthAI.freeDiseases;
                
                Object.entries(diseases).forEach(([key, value]) => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-item';
                    label.innerHTML = `
                        <input type="checkbox" name="disease" value="${key}">
                        <span>${value.icon} ${value.name}</span>
                    `;
                    container.appendChild(label);
                });
            }

            loadProfileData() {
                const profile = this.healthAI.userProfile;
                console.log('بيانات المستخدم المحملة:', profile);
            }

            updateProfileForm() {
                const profile = this.healthAI.userProfile;
                
                document.getElementById('nameInput').value = profile.name;
                document.getElementById('ageInput').value = profile.age;
                document.getElementById('genderSelect').value = profile.gender;
                document.getElementById('weightInput').value = profile.weight;
                document.getElementById('heightInput').value = profile.height;
                document.getElementById('activitySelect').value = profile.activityLevel;
                document.getElementById('ifPlanSelect').value = profile.ifPlan;
                document.getElementById('ketoToggle').checked = profile.isKeto;

                // تحديد الأمراض المحفوظة
                profile.diseases.forEach(disease => {
                    const checkbox = document.querySelector(`input[name="disease"][value="${disease}"]`);
                    if (checkbox) checkbox.checked = true;
                });

                // تحديد الحساسيات
                profile.allergies.forEach(allergy => {
                    const checkbox = document.querySelector(`input[name="allergy"][value="${allergy}"]`);
                    if (checkbox) checkbox.checked = true;
                });

                // تحديد الهدف
                const goalRadio = document.querySelector(`input[name="goal"][value="${profile.goal}"]`);
                if (goalRadio) goalRadio.checked = true;
            }

            updateWelcome() {
                const profile = this.healthAI.userProfile;
                document.getElementById('welcomeMessage').textContent = 
                    `مرحباً بك ${profile.name}! BMI: ${profile.bmi.toFixed(1)} - ${profile.bmiCategory}`;
            }

            updateHealthDisplay() {
                const stats = document.getElementById('healthStats');
                const profile = this.healthAI.userProfile;
                
                stats.innerHTML = `
                    <div class="stat-item">
                        <span class="stat-label">📏 مؤشر كتلة الجسم</span>
                        <span class="stat-value">${profile.bmi.toFixed(1)}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">🔥 السعرات اليومية</span>
                        <span class="stat-value">${profile.tdee} سعرة</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">⏰ خطة الصيام</span>
                        <span class="stat-value">${this.healthAI.intermittentFastingPlans[profile.ifPlan].name}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">🎯 الهدف</span>
                        <span class="stat-value">${this.getGoalLabel(profile.goal)}</span>
                    </div>
                `;

                // عرض النصائح الصحية
                const tips = this.healthAI.getPersonalizedHealthTips();
                const tipsHtml = tips.map(tip => `
                    <div class="tip-item">
                        <span class="tip-icon">✓</span>
                        <span>${tip}</span>
                    </div>
                `).join('');
                document.getElementById('healthTips').innerHTML = tipsHtml;

                // عرض الخطة اليومية
                const dailyPlan = this.healthAI.generateDailyHealthPlan();
                const planHtml = `
                    <div class="stat-item">
                        <span>⏱️ وقت الصيام</span>
                        <span>${dailyPlan.fastingHours} ساعات</span>
                    </div>
                    <div class="stat-item">
                        <span>🍽️ نافذة الأكل</span>
                        <span>${dailyPlan.eatingWindow} ساعات</span>
                    </div>
                    <div class="stat-item">
                        <span>🔥 إجمالي السعرات</span>
                        <span>${dailyPlan.totalCalories} سعرة</span>
                    </div>
                `;
                document.getElementById('dailyPlan').innerHTML = planHtml;
            }

            getGoalLabel(goal) {
                const labels = {
                    'lose': 'خسارة الوزن',
                    'maintain': 'الحفاظ',
                    'gain': 'اكتساب الوزن'
                };
                return labels[goal] || goal;
            }

            loadRecipes() {
                // وصفات تجريبية
                const recipes = [
                    {
                        id: 1,
                        title: 'شوربة الدجاج بالأرز',
                        emoji: '🍲',
                        time: '30 دقيقة',
                        difficulty: 'سهل',
                        rating: 4.5,
                        ingredients: ['دجاج', 'أرز', 'جزر', 'بصل'],
                        calories: 350,
                        protein: 28,
                        carbs: 35,
                        fat: 8
                    },
                    {
                        id: 2,
                        title: 'سلطة الدجاج والخضار',
                        emoji: '🥗',
                        time: '15 دقيقة',
                        difficulty: 'سهل جداً',
                        rating: 4.8,
                        ingredients: ['دجاج', 'خيار', 'طماطم', 'خس'],
                        calories: 280,
                        protein: 35,
                        carbs: 12,
                        fat: 5
                    },
                    {
                        id: 3,
                        title: 'سمك السلمون بالليمون',
                        emoji: '🐟',
                        time: '25 دقيقة',
                        difficulty: 'متوسط',
                        rating: 4.7,
                        ingredients: ['سمك', 'ليمون', 'ثوم', 'زيت'],
                        calories: 320,
                        protein: 32,
                        carbs: 5,
                        fat: 18
                    }
                ];

                const grid = document.getElementById('recipesGrid');
                grid.innerHTML = recipes.map(recipe => `
                    <div class="card hover-lift-3d">
                        <div class="card-header">
                            <span class="card-icon">${recipe.emoji}</span>
                            <h3 class="card-title">${recipe.title}</h3>
                        </div>
                        <div class="card-content">
                            <p>⏱️ ${recipe.time} • 📊 ${recipe.difficulty}</p>
                            <p>⭐ ${recipe.rating} | 🔥 ${recipe.calories} سعرة</p>
                            <p>📈 بروتين: ${recipe.protein}g | كربوهيدرات: ${recipe.carbs}g | دهون: ${recipe.fat}g</p>
                            <p>🥘 ${recipe.ingredients.join(' • ')}</p>
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-primary" onclick="app.animations.addRippleEffect(this, event)">👁️ عرض</button>
                            <button class="btn btn-secondary" onclick="saveRecipe(${recipe.id})">❤️ حفظ</button>
                        </div>
                    </div>
                `).join('');
            }

            registerServiceWorker() {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js').catch(err => {
                        console.log('خطأ في تسجيل Service Worker:', err);
                    });
                }
            }

            applyAnimations() {
                const cards = document.querySelectorAll('.card');
                cards.forEach((card, index) => {
                    setTimeout(() => {
                        this.animations.add3DAnimation(card, 'float3D', 3);
                    }, index * 100);
                });
            }

            toggleDarkMode() {
                document.body.classList.toggle('dark-mode');
            }
        }

        // تهيئة التطبيق
        const app = new TayyibatApp();

        // دوال واجهة المستخدم
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function showProfileModal() {
            document.getElementById('profileModal').classList.add('active');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('active');
        }

        function saveProfile() {
            const profile = {
                name: document.getElementById('nameInput').value,
                age: parseInt(document.getElementById('ageInput').value),
                gender: document.getElementById('genderSelect').value,
                weight: parseFloat(document.getElementById('weightInput').value),
                height: parseInt(document.getElementById('heightInput').value),
                activityLevel: document.getElementById('activitySelect').value,
                goal: document.querySelector('input[name="goal"]:checked')?.value || 'maintain',
                diseases: Array.from(document.querySelectorAll('input[name="disease"]:checked')).map(cb => cb.value),
                allergies: Array.from(document.querySelectorAll('input[name="allergy"]:checked')).map(cb => cb.value),
                ifPlan: document.getElementById('ifPlanSelect').value,
                isKeto: document.getElementById('ketoToggle').checked
            };

            app.healthAI.updateUserData(profile);
            app.updateWelcome();
            app.updateHealthDisplay();
            closeProfileModal();
            showSuccess('تم حفظ البيانات بنجاح ✓');
        }

        function updateIFPlan() {
            const plan = document.getElementById('ifPlanSelect').value;
            app.healthAI.updateUserData({ ifPlan: plan });
            app.updateHealthDisplay();
        }

        function toggleKeto() {
            const isKeto = document.getElementById('ketoToggle').checked;
            app.healthAI.updateUserData({ isKeto });
            app.updateHealthDisplay();
        }

        async function analyzeIngredients() {
            const input = document.getElementById('ingredientInput').value;
            const ingredients = input.split(',').map(ing => ing.trim());
            
            const result = await app.healthAI.analyzeAvailableIngredientsAndSuggest(ingredients);
            
            const resultDiv = document.getElementById('analysisResult');
            resultDiv.innerHTML = `
                <div style="margin-top: 20px;">
                    <h4>النتائج:</h4>
                    <p>تم تحليل ${ingredients.length} مكونات</p>
                    <p>${result.length > 0 ? 'تم العثور على وصفات مناسبة' : 'لم يتم العثور على وصفات'}</p>
                </div>
            `;
        }

        function exportHealthReport() {
            const report = app.healthAI.exportHealthReport();
            const json = JSON.stringify(report, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'health-report.json';
            a.click();
            showSuccess('تم تصدير التقرير ✓');
        }

        function resetAllData() {
            if (confirm('هل تريد حقاً إعادة تعيين جميع البيانات؟')) {
                localStorage.clear();
                location.reload();
            }
        }

        function saveRecipe(id) {
            showSuccess(`تم حفظ الوصفة رقم ${id} ❤️`);
        }

        function showSuccess(message) {
            const div = document.createElement('div');
            div.className = 'success-message';
            div.innerHTML = `✓ ${message}`;
            document.body.insertBefore(div, document.body.firstChild);
            setTimeout(() => div.remove(), 3000);
        }

        // إغلاق النموذج عند النقر خارجه
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('profileModal');
            if (e.target === modal) {
                closeProfileModal();
            }
        });
    </script>
</body>
</html>
