<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - نظام طيبات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a1628;
      color: #e8f0fc;
      font-family: 'Tajawal', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .login-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 40px;
    }

    .login-box {
      width: 100%;
      max-width: 500px;
      background: linear-gradient(145deg, #0f2848, #112244);
      border: 1.5px solid rgba(200,150,12,.35);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
    }

    .logo-section {
      margin-bottom: 30px;
    }

    .logo-icon {
      font-size: 4rem;
      margin-bottom: 15px;
      display: block;
      filter: drop-shadow(0 0 20px rgba(200,150,12,.5));
    }

    .logo-title {
      font-family: 'Amiri', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #d4af37;
      margin-bottom: 10px;
    }

    .logo-subtitle {
      font-size: .9rem;
      color: #b0c4de;
    }

    .input-group {
      margin: 20px 0;
    }

    .input-group label {
      display: block;
      font-size: .9rem;
      font-weight: 700;
      color: #d4af37;
      margin-bottom: 8px;
      text-align: right;
    }

    .input-group input {
      width: 100%;
      background: #0d1f3c;
      border: 1.5px solid rgba(200,150,12,.2);
      border-radius: 12px;
      padding: 14px;
      color: #e8f0fc;
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: all .3s;
    }

    .input-group input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(200,150,12,.2);
    }

    .error-message {
      background: rgba(229,57,53,.15);
      border: 1px solid rgba(229,57,53,.4);
      color: #ef5350;
      padding: 12px;
      border-radius: 10px;
      font-size: .85rem;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #c8960c, #d4af37);
      color: #050e1f;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 800;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      transition: all .3s;
      margin-top: 20px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(200,150,12,.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .dashboard-section {
      display: none;
    }

    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid rgba(200,150,12,.2);
    }

    .dashboard-title {
      font-family: 'Amiri', serif;
      font-size: 2.2rem;
      color: #d4af37;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .btn-logout {
      background: rgba(229,57,53,.15);
      border: 1px solid rgba(229,57,53,.4);
      color: #ef5350;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-family: 'Tajawal', sans-serif;
      transition: all .3s;
    }

    .btn-logout:hover {
      background: rgba(229,57,53,.25);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(145deg, #0f2848, #112244);
      border: 1.5px solid rgba(200,150,12,.2);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .stat-card.users-total {
      border-color: rgba(33,150,243,.4);
    }

    .stat-card.users-active {
      border-color: rgba(46,201,81,.4);
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 900;
      color: #d4af37;
      margin: 15px 0;
    }

    .stat-label {
      font-size: .9rem;
      color: #b0c4de;
      font-weight: 700;
    }

    .users-section {
      background: linear-gradient(145deg, #0f2848, #112244);
      border: 1.5px solid rgba(200,150,12,.2);
      border-radius: 16px;
      padding: 25px;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: #d4af37;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .users-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 600px;
      overflow-y: auto;
    }

    .user-card {
      background: linear-gradient(135deg, rgba(13,31,60,.5), rgba(17,34,68,.5));
      border: 1px solid rgba(200,150,12,.15);
      border-radius: 12px;
      padding: 15px;
      cursor: pointer;
      transition: all .3s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-card:hover {
      border-color: #d4af37;
      background: linear-gradient(135deg, rgba(13,31,60,.7), rgba(17,34,68,.7));
      transform: translateX(-5px);
    }

    .user-card.active {
      border-color: #d4af37;
      background: linear-gradient(135deg, rgba(200,150,12,.1), rgba(200,150,12,.05));
    }

    .user-info {
      flex: 1;
      text-align: right;
    }

    .user-name {
      font-size: 1rem;
      font-weight: 800;
      color: #e8f0fc;
      margin-bottom: 4px;
    }

    .user-meta {
      font-size: .75rem;
      color: #8aa4c8;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: .7rem;
      font-weight: 700;
      background: rgba(46,201,81,.15);
      color: #2ec951;
    }

    .status-badge.inactive {
      background: rgba(200,150,12,.1);
      color: #d4af37;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(145deg, #0f2848, #112244);
      border: 1.5px solid rgba(200,150,12,.35);
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      left: 15px;
      background: none;
      border: none;
      color: #d4af37;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .modal-title {
      font-family: 'Amiri', serif;
      font-size: 1.5rem;
      color: #d4af37;
      margin-bottom: 20px;
      margin-top: 10px;
      text-align: center;
    }

    .user-detail-item {
      margin-bottom: 15px;
    }

    .user-detail-label {
      font-size: .85rem;
      color: #d4af37;
      font-weight: 700;
      margin-bottom: 5px;
      display: block;
    }

    .user-detail-value {
      font-size: .95rem;
      color: #e8f0fc;
      background: rgba(13,31,60,.5);
      border: 1px solid rgba(200,150,12,.15);
      border-radius: 10px;
      padding: 10px;
      word-break: break-all;
    }

    .password-section {
      background: rgba(200,150,12,.1);
      border: 1px solid rgba(200,150,12,.25);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .password-field {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .password-input {
      flex: 1;
      background: #0d1f3c;
      border: 1px solid rgba(200,150,12,.2);
      border-radius: 8px;
      padding: 10px;
      color: #d4af37;
      font-family: monospace;
      font-size: .9rem;
    }

    .copy-btn {
      background: #d4af37;
      color: #050e1f;
      border: none;
      border-radius: 8px;
      padding: 10px 15px;
      cursor: pointer;
      font-weight: 700;
      font-family: 'Tajawal', sans-serif;
      transition: all .3s;
    }

    .copy-btn:hover {
      background: #f5c842;
    }

    .edit-section {
      border-top: 1px solid rgba(200,150,12,.15);
      padding-top: 20px;
    }

    .edit-title {
      font-size: 1rem;
      font-weight: 800;
      color: #d4af37;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: .8rem;
      color: #d4af37;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      background: #0d1f3c;
      border: 1.5px solid rgba(200,150,12,.2);
      border-radius: 10px;
      padding: 10px;
      color: #e8f0fc;
      font-family: 'Tajawal', sans-serif;
    }

    .form-group input:focus {
      border-color: #d4af37;
      outline: none;
    }

    .form-group input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .experiences-section {
      background: rgba(200,150,12,.05);
      border: 1px solid rgba(200,150,12,.15);
      border-radius: 10px;
      padding: 12px;
      font-size: .75rem;
      color: #b0c4de;
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 15px;
    }

    .save-btn {
      width: 100%;
      background: linear-gradient(135deg, #c8960c, #d4af37);
      color: #050e1f;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 700;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      transition: all .3s;
      font-size: 1rem;
    }

    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(200,150,12,.3);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15,31,58,.95);
      border: 1px solid rgba(200,150,12,.35);
      color: #e8f0fc;
      padding: 12px 20px;
      border-radius: 20px;
      z-index: 2000;
      backdrop-filter: blur(10px);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      pointer-events: auto;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(200,150,12,.05);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(200,150,12,.3);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(200,150,12,.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- قسم الدخول -->
    <div class="login-section" id="loginSection">
      <div class="login-box">
        <div class="logo-section">
          <span class="logo-icon">🌿</span>
          <div class="logo-title">طيبات</div>
          <div class="logo-subtitle">لوحة التحكم الإدارية</div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="input-group">
          <label>كلمة السر</label>
          <input type="password" id="passwordInput" placeholder="أدخل كلمة السر" onkeydown="if(event.key==='Enter') loginAdmin()">
        </div>

        <button class="btn-login" onclick="loginAdmin()">
          <i class="fas fa-lock-open"></i> دخول
        </button>
      </div>
    </div>

    <!-- قسم لوحة التحكم -->
    <div class="dashboard-section" id="dashboardSection">
      <div class="dashboard-header">
        <div class="dashboard-title">
          <i class="fas fa-sliders-h"></i> لوحة التحكم
        </div>
        <button class="btn-logout" onclick="logoutAdmin()">
          <i class="fas fa-sign-out-alt"></i> خروج
        </button>
      </div>

      <!-- الإحصائيات -->
      <div class="stats-grid">
        <div class="stat-card users-total">
          <div class="stat-label">إجمالي المستخدمين</div>
          <div class="stat-value" id="totalUsersCount">0</div>
        </div>
        <div class="stat-card users-active">
          <div class="stat-label">المستخدمين النشطين</div>
          <div class="stat-value" id="activeUsersCount">0</div>
        </div>
      </div>

      <!-- قائمة المستخدمين -->
      <div class="users-section">
        <div class="section-title">
          <i class="fas fa-users"></i> قائمة المستخدمين
        </div>
        <div class="users-list" id="usersList"></div>
      </div>
    </div>
  </div>

  <!-- نافذة تفاصيل المستخدم -->
  <div class="modal-overlay" id="userModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeUserModal()">
        <i class="fas fa-times"></i>
      </button>
      <div class="modal-title">تفاصيل المستخدم</div>

      <!-- البيانات الأساسية -->
      <div class="user-detail-item">
        <span class="user-detail-label">👤 الاسم الكامل</span>
        <div class="user-detail-value" id="detailName">-</div>
      </div>

      <div class="user-detail-item">
        <span class="user-detail-label">📌 اسم المستخدم</span>
        <div class="user-detail-value" id="detailUsername">-</div>
      </div>

      <div class="user-detail-item">
        <span class="user-detail-label">⚖️ الوزن (كجم)</span>
        <div class="user-detail-value" id="detailWeight">-</div>
      </div>

      <div class="user-detail-item">
        <span class="user-detail-label">📏 الطول (سم)</span>
        <div class="user-detail-value" id="detailHeight">-</div>
      </div>

      <div class="user-detail-item">
        <span class="user-detail-label">📊 مؤشر كتلة الجسم</span>
        <div class="user-detail-value" id="detailBMI">-</div>
      </div>

      <div class="user-detail-item">
        <span class="user-detail-label">📅 تاريخ الإنشاء</span>
        <div class="user-detail-value" id="detailCreated">-</div>
      </div>

      <!-- كلمة المرور -->
      <div class="password-section">
        <div class="user-detail-label">🔐 كلمة المرور</div>
        <div class="password-field">
          <input type="text" class="password-input" id="passwordDisplay" readonly>
          <button class="copy-btn" onclick="copyPassword()">
            <i class="fas fa-copy"></i> نسخ
          </button>
        </div>
      </div>

      <!-- قسم التعديل -->
      <div class="edit-section">
        <div class="edit-title">
          <i class="fas fa-edit"></i> تعديل البيانات
        </div>

        <div class="form-group">
          <label>الاسم الكامل</label>
          <input type="text" id="editName">
        </div>

        <div class="form-group">
          <label>اسم المستخدم</label>
          <input type="text" id="editUsername" disabled>
        </div>

        <div class="form-group">
          <label>الوزن (كجم)</label>
          <input type="number" id="editWeight">
        </div>

        <div class="form-group">
          <label>الطول (سم)</label>
          <input type="number" id="editHeight">
        </div>

        <div class="user-detail-label" style="margin-top: 15px; margin-bottom: 8px;">
          <i class="fas fa-flask-vial"></i> التجارب المسجلة
        </div>
        <div class="experiences-section" id="experiencesDisplay">لا توجد تجارب</div>

        <button class="save-btn" onclick="saveUserChanges()">
          <i class="fas fa-save"></i> حفظ التعديلات
        </button>
      </div>
    </div>
  </div>

  <!-- إشعارات -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

    const firebaseConfig = { 
      databaseURL: "https://daybat-cfa12-default-rtdb.firebaseio.com" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let isLoggedIn = false;
    let allUsers = [];
    let selectedUser = null;

    window.loginAdmin = function() {
      const password = document.getElementById('passwordInput').value;
      const errorEl = document.getElementById('errorMessage');

      if (password === '521988') {
        isLoggedIn = true;
        sessionStorage.setItem('admin_logged_in', 'true');
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        loadAllUsers();
      } else {
        errorEl.textContent = '❌ كلمة السر غير صحيحة';
        errorEl.classList.add('show');
        document.getElementById('passwordInput').value = '';
      }
    };

    window.logoutAdmin = function() {
      isLoggedIn = false;
      sessionStorage.removeItem('admin_logged_in');
      document.getElementById('loginSection').style.display = 'flex';
      document.getElementById('dashboardSection').style.display = 'none';
      document.getElementById('passwordInput').value = '';
      allUsers = [];
    };

    async function loadAllUsers() {
      try {
        const snapshot = await get(child(ref(db), 'users'));
        if (snapshot.exists()) {
          const usersData = snapshot.val();
          allUsers = Object.keys(usersData || {}).map(key => ({
            id: key,
            ...usersData[key]
          }));

          document.getElementById('totalUsersCount').textContent = allUsers.length;

          const activeUsers = allUsers.filter(u => 
            u.lastLogin && Date.now() - u.lastLogin < 86400000
          ).length;
          document.getElementById('activeUsersCount').textContent = activeUsers;

          renderUsersList();
        }
      } catch (error) {
        showToast('❌ خطأ في تحميل البيانات');
      }
    }

    function renderUsersList() {
      const container = document.getElementById('usersList');
      container.innerHTML = '';

      allUsers.forEach(user => {
        const isActive = user.lastLogin && Date.now() - user.lastLogin < 86400000;
        const lastLogin = user.lastLogin ? 
          new Date(user.lastLogin).toLocaleDateString('ar') : 
          'لم يدخل';

        const card = document.createElement('div');
        card.className = 'user-card';
        if (selectedUser && selectedUser.id === user.id) {
          card.classList.add('active');
        }

        card.innerHTML = `
          <div class="user-info">
            <div class="user-name">${user.name || 'مستخدم'}</div>
            <div class="user-meta">
              <span>👤 ${user.username}</span>
              <span class="status-badge ${isActive ? '' : 'inactive'}">
                ${isActive ? '🟢 نشط' : '⚫ غير نشط'}
              </span>
              <span>📅 ${lastLogin}</span>
            </div>
          </div>
        `;

        card.onclick = () => openUserModal(user);
        container.appendChild(card);
      });
    }

    window.openUserModal = function(user) {
      selectedUser = user;

      document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
      event.target.closest('.user-card').classList.add('active');

      const bmi = user.height ? 
        ((user.weight / (user.height * user.height)) * 10000).toFixed(1) : 
        '-';
      const created = user.createdAt ? 
        new Date(user.createdAt).toLocaleDateString('ar') : 
        '-';

      document.getElementById('detailName').textContent = user.name || '-';
      document.getElementById('detailUsername').textContent = user.username || '-';
      document.getElementById('detailWeight').textContent = (user.weight || '-') + ' كجم';
      document.getElementById('detailHeight').textContent = (user.height || '-') + ' سم';
      document.getElementById('detailBMI').textContent = bmi;
      document.getElementById('detailCreated').textContent = created;
      document.getElementById('passwordDisplay').value = user.password || '------';

      document.getElementById('editName').value = user.name || '';
      document.getElementById('editUsername').value = user.username || '';
      document.getElementById('editWeight').value = user.weight || '';
      document.getElementById('editHeight').value = user.height || '';

      if (user.experiences && Object.keys(user.experiences).length > 0) {
        let expHtml = '';
        Object.keys(user.experiences).forEach(key => {
          const exp = user.experiences[key];
          expHtml += `<div style="margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,.1);">
            <strong>${exp.disease}</strong><br>
            ${exp.content.substring(0, 100)}...
          </div>`;
        });
        document.getElementById('experiencesDisplay').innerHTML = expHtml;
      } else {
        document.getElementById('experiencesDisplay').textContent = 'لا توجد تجارب';
      }

      document.getElementById('userModal').classList.add('show');
    };

    window.closeUserModal = function() {
      document.getElementById('userModal').classList.remove('show');
      selectedUser = null;
    };

    window.copyPassword = function() {
      const password = document.getElementById('passwordDisplay').value;
      navigator.clipboard.writeText(password);
      showToast('✅ تم نسخ كلمة السر');
    };

    window.saveUserChanges = function() {
      if (!selectedUser) return;

      const updates = {
        name: document.getElementById('editName').value,
        weight: parseInt(document.getElementById('editWeight').value) || 0,
        height: parseInt(document.getElementById('editHeight').value) || 0
      };

      const userRef = ref(db, 'users/' + selectedUser.id);
      set(userRef, { ...selectedUser, ...updates })
        .then(() => {
          showToast('✅ تم حفظ التعديلات');
          closeUserModal();
          loadAllUsers();
        })
        .catch(err => {
          showToast('❌ خطأ: ' + err.message);
        });
    };

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    window.showToast = showToast;

    // التحقق من جلسة سابقة
    if (sessionStorage.getItem('admin_logged_in') === 'true') {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboardSection').style.display = 'block';
      isLoggedIn = true;
      loadAllUsers();
    }
  </script>
</body>
</html>
