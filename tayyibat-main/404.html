<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - الصفحة غير موجودة | طيبات</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050e1f;
    --bg2: #0a1628;
    --gold: #c8960c;
    --gold2: #f5c842;
    --txt: #e8f0fc;
    --txt2: #8aa4c8;
    --border: #1e3560;
    --card: #0d1e38;
    --green: #2ec951;
    --red: #ef5350;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--txt);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ─── نجوم الخلفية ─── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) var(--delay, 0s) ease-in-out infinite alternate;
    opacity: var(--op, 0.5);
  }
  @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.9; } }

  /* ─── Layout ─── */
  .container {
    position: relative; z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    padding: 40px 20px;
    max-width: 900px;
    width: 100%;
    flex-wrap: wrap;
  }

  /* ─── الخلاط ─── */
  .blender-wrap {
    position: relative;
    flex-shrink: 0;
    filter: drop-shadow(0 0 40px rgba(200,150,12,0.3));
  }

  .blender-svg {
    width: 260px;
    height: 320px;
    animation: blenderBob 2.5s ease-in-out infinite;
  }
  @keyframes blenderBob {
    0%,100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-8px) rotate(-1deg); }
    75% { transform: translateY(-4px) rotate(1deg); }
  }

  /* جسم الخلاط الزجاجي يهتز */
  .blender-glass {
    animation: shakeGlass 0.15s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes shakeGlass {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    75% { transform: translateX(2px); }
  }

  /* نص 404 يدور داخل الخلاط */
  .num-404-group {
    animation: spin404 3s linear infinite;
    transform-origin: 130px 160px;
  }
  @keyframes spin404 {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* فقاعات داخل الخلاط */
  .bubble {
    animation: bubbleRise var(--bd, 1.2s) var(--bdelay, 0s) ease-in infinite;
    opacity: 0;
  }
  @keyframes bubbleRise {
    0% { transform: translateY(0); opacity: 0.7; }
    100% { transform: translateY(-80px); opacity: 0; }
  }

  /* دوران شفرات الخلاط */
  .blade-group {
    animation: bladeSpin 0.2s linear infinite;
    transform-origin: 130px 240px;
  }
  @keyframes bladeSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ─── النص ─── */
  .text-side {
    text-align: right;
    max-width: 380px;
  }

  .crying-emoji {
    font-size: 4.5rem;
    display: block;
    margin-bottom: 10px;
    animation: cryBounce 1.5s ease-in-out infinite;
    filter: drop-shadow(0 0 15px rgba(100,180,255,0.5));
  }
  @keyframes cryBounce {
    0%,100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-12px) scale(1.1); }
    60% { transform: translateY(-5px) scale(1.05); }
  }

  /* دموع تنزل */
  .tears {
    position: relative;
    display: inline-block;
  }
  .tear {
    position: absolute;
    width: 4px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: linear-gradient(180deg, #64b5f6, #1e88e5);
    animation: tearDrop var(--td, 1.5s) var(--tdelay, 0s) ease-in infinite;
    opacity: 0;
  }
  @keyframes tearDrop {
    0% { transform: translateY(0); opacity: 1; }
    80% { opacity: 0.8; }
    100% { transform: translateY(60px); opacity: 0; }
  }

  .sorry-title {
    font-family: 'Amiri', serif;
    font-size: 2.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .not-found-text {
    font-size: 1.15rem;
    color: var(--txt2);
    font-weight: 600;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .forbidden-foods {
    background: linear-gradient(135deg, rgba(13,30,56,0.9), rgba(17,34,68,0.8));
    border: 1px solid rgba(200,150,12,0.25);
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 24px;
    font-size: 1rem;
    color: var(--txt2);
    line-height: 2;
  }
  .forbidden-foods strong {
    color: var(--txt);
    font-weight: 700;
  }
  .food-emoji {
    display: inline-block;
    animation: foodWobble 2s ease-in-out infinite;
    font-size: 1.3rem;
  }
  .food-emoji:nth-child(1) { animation-delay: 0s; }
  .food-emoji:nth-child(2) { animation-delay: 0.3s; }
  .food-emoji:nth-child(3) { animation-delay: 0.6s; }
  @keyframes foodWobble {
    0%,100% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(-15deg) scale(1.2); }
    75% { transform: rotate(15deg) scale(1.2); }
  }

  /* ─── عداد العودة ─── */
  .countdown-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .countdown-ring {
    position: relative;
    width: 60px;
    height: 60px;
    flex-shrink: 0;
  }
  .countdown-ring svg {
    transform: rotate(-90deg);
  }
  .countdown-ring .ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 5;
  }
  .countdown-ring .ring-fill {
    fill: none;
    stroke: var(--gold2);
    stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 164;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
  }
  .countdown-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--gold2);
    font-family: 'Tajawal', sans-serif;
  }

  .countdown-text {
    font-size: 0.9rem;
    color: var(--txt2);
    line-height: 1.5;
  }
  .countdown-text strong {
    color: var(--gold2);
    font-size: 1rem;
  }

  .btn-home {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 18px;
    padding: 14px 28px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #050e1f;
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(200,150,12,0.35);
    animation: btnPulse 2s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%,100% { box-shadow: 0 4px 20px rgba(200,150,12,0.35); }
    50% { box-shadow: 0 4px 35px rgba(200,150,12,0.65); transform: scale(1.03); }
  }
  .btn-home:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 30px rgba(200,150,12,0.5); }

  /* ─── شعار طيبات صغير ─── */
  .brand {
    position: fixed;
    top: 20px;
    right: 24px;
    font-family: 'Amiri', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold2);
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
    opacity: 0.8;
  }

  @media (max-width: 640px) {
    .container { flex-direction: column; gap: 30px; padding: 20px; }
    .text-side { text-align: center; max-width: 100%; }
    .sorry-title { font-size: 1.8rem; }
    .blender-svg { width: 200px; height: 250px; }
    .countdown-wrap { justify-content: center; }
    .brand { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<!-- النجوم -->
<div class="stars" id="stars"></div>

<!-- الشعار -->
<div class="brand">🌿 طيبات</div>

<div class="container">

  <!-- ─── الخلاط ─── -->
  <div class="blender-wrap">
    <svg class="blender-svg" viewBox="0 0 260 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#0d2040;stop-opacity:0.9"/>
          <stop offset="40%" style="stop-color:#1a3a6a;stop-opacity:0.7"/>
          <stop offset="100%" style="stop-color:#0d2040;stop-opacity:0.9"/>
        </linearGradient>
        <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#1e3560"/>
          <stop offset="100%" style="stop-color:#0a1628"/>
        </linearGradient>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#c8960c"/>
          <stop offset="100%" style="stop-color:#f5c842"/>
        </linearGradient>
        <clipPath id="glassClip">
          <polygon points="70,50 190,50 210,250 50,250"/>
        </clipPath>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- القاعدة -->
      <rect x="45" y="255" width="170" height="50" rx="12" fill="url(#baseGrad)" stroke="#1e3560" stroke-width="1.5"/>
      <!-- زر تشغيل -->
      <circle cx="100" cy="280" r="10" fill="#0d47a1" stroke="#1e3560" stroke-width="1.5"/>
      <circle cx="100" cy="280" r="6" fill="url(#goldGrad)" opacity="0.9"/>
      <circle cx="130" cy="280" r="8" fill="#0d1e38" stroke="#1e3560" stroke-width="1.5"/>
      <circle cx="130" cy="280" r="5" fill="#2ec951" opacity="0.8"/>
      <circle cx="158" cy="280" r="8" fill="#0d1e38" stroke="#1e3560" stroke-width="1.5"/>
      <circle cx="158" cy="280" r="5" fill="#1e3560" opacity="0.8"/>
      <!-- مؤشر LED -->
      <circle cx="185" cy="280" r="5" fill="var(--green)" opacity="0.9">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
      </circle>

      <!-- جسم الخلاط الزجاجي -->
      <g class="blender-glass">
        <!-- الجسم الخارجي -->
        <polygon points="70,50 190,50 210,250 50,250"
          fill="url(#glassGrad)" stroke="#2a4a8a" stroke-width="2"/>
        <!-- تأثير لمعة جانبية -->
        <polygon points="75,55 95,55 85,245 60,245"
          fill="rgba(255,255,255,0.04)"/>
        <polygon points="165,55 185,55 200,245 175,245"
          fill="rgba(255,255,255,0.03)"/>

        <!-- سائل الخلاط (أخضر ذهبي) -->
        <polygon points="55,160 205,160 208,248 52,248" clip-path="url(#glassClip)"
          fill="rgba(14,80,20,0.55)" opacity="0.8">
          <animate attributeName="points"
            values="55,160 205,160 208,248 52,248;
                    52,165 208,158 208,248 52,248;
                    55,160 205,160 208,248 52,248"
            dur="0.8s" repeatCount="indefinite"/>
        </polygon>

        <!-- فقاعات داخل السائل -->
        <circle class="bubble" cx="85" cy="230" r="5" fill="rgba(200,150,12,0.4)"
          style="--bd:1.3s;--bdelay:0s"/>
        <circle class="bubble" cx="130" cy="235" r="7" fill="rgba(46,201,81,0.3)"
          style="--bd:1.1s;--bdelay:0.3s"/>
        <circle class="bubble" cx="170" cy="228" r="4" fill="rgba(200,150,12,0.3)"
          style="--bd:1.5s;--bdelay:0.6s"/>
        <circle class="bubble" cx="110" cy="240" r="6" fill="rgba(46,201,81,0.25)"
          style="--bd:1.2s;--bdelay:0.9s"/>
        <circle class="bubble" cx="150" cy="232" r="3" fill="rgba(255,255,255,0.2)"
          style="--bd:0.9s;--bdelay:0.2s"/>

        <!-- نص 404 يدور داخل الخلاط -->
        <g class="num-404-group" clip-path="url(#glassClip)">
          <text x="130" y="175" text-anchor="middle"
            font-family="Amiri, serif" font-size="72" font-weight="700"
            fill="url(#goldGrad)" opacity="0.85" filter="url(#glow)"
            transform="translate(-130,-160) translate(130,160)">
            404
          </text>
        </g>

        <!-- غطاء الخلاط -->
        <rect x="78" y="38" width="104" height="16" rx="8"
          fill="#1a3a6a" stroke="#2a4a8a" stroke-width="1.5"/>
        <rect x="105" y="22" width="50" height="20" rx="6"
          fill="#0d2040" stroke="#2a4a8a" stroke-width="1.5"/>
        <!-- مقبض الغطاء -->
        <ellipse cx="130" cy="20" rx="18" ry="8"
          fill="url(#baseGrad)" stroke="#2a4a8a" stroke-width="1.5"/>
        <ellipse cx="130" cy="18" rx="12" ry="5"
          fill="url(#goldGrad)" opacity="0.7"/>

        <!-- مقبض جانبي -->
        <path d="M210,100 Q250,130 240,180 Q235,200 210,200"
          fill="none" stroke="#1e3560" stroke-width="12" stroke-linecap="round"/>
        <path d="M210,100 Q245,130 235,180 Q230,198 210,200"
          fill="none" stroke="#2a4a8a" stroke-width="6" stroke-linecap="round"/>
      </g>

      <!-- شفرات الخلاط -->
      <g class="blade-group">
        <ellipse cx="130" cy="240" rx="40" ry="6" fill="rgba(200,150,12,0.6)" stroke="rgba(245,200,66,0.4)" stroke-width="1"/>
        <ellipse cx="130" cy="240" rx="6" ry="30" fill="rgba(200,150,12,0.5)" stroke="rgba(245,200,66,0.3)" stroke-width="1"/>
        <circle cx="130" cy="240" r="5" fill="var(--gold2)" opacity="0.8"/>
      </g>

      <!-- بخار/طاقة تتصاعد -->
      <g opacity="0.6">
        <circle cx="90" cy="35" r="3" fill="rgba(200,150,12,0.4)">
          <animate attributeName="cy" values="35;10;35" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="r" values="3;1;3" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="130" cy="30" r="4" fill="rgba(200,150,12,0.35)">
          <animate attributeName="cy" values="30;5;30" dur="2.3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.5;0;0.5" dur="2.3s" repeatCount="indefinite"/>
          <animate attributeName="r" values="4;1;4" dur="2.3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="165" cy="35" r="3" fill="rgba(200,150,12,0.4)">
          <animate attributeName="cy" values="35;12;35" dur="1.8s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" repeatCount="indefinite"/>
          <animate attributeName="r" values="3;1;3" dur="1.8s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- تأثير اهتزاز الخلاط في القاعدة -->
      <ellipse cx="130" cy="304" rx="70" ry="8" fill="rgba(0,0,0,0.3)" opacity="0.5">
        <animate attributeName="rx" values="70;65;70" dur="0.15s" repeatCount="indefinite"/>
      </ellipse>
    </svg>
  </div>

  <!-- ─── النص ─── -->
  <div class="text-side">

    <!-- الإيموشن الباكي -->
    <div class="tears" style="display:block;text-align:right;margin-bottom:6px;">
      <span class="crying-emoji">😢</span>
      <span class="tear" style="--td:1.8s;--tdelay:0s;width:5px;height:12px;top:55px;right:42px;"></span>
      <span class="tear" style="--td:1.8s;--tdelay:0.5s;width:4px;height:9px;top:55px;right:36px;"></span>
    </div>

    <div class="sorry-title">المعذرة!</div>

    <p class="not-found-text">
      الصفحة التي طلبتها غير موجودة 🔍<br>
      <span style="color:var(--txt3);font-size:0.95rem;">ربما تكون قد...</span>
    </p>

    <div class="forbidden-foods">
      <strong>ربما أكلت بيض </strong><span class="food-emoji">🥚</span><br>
      <strong>أو أكلت دجاج </strong><span class="food-emoji">🍗</span><br>
      <strong>أو شربت اللبن </strong><span class="food-emoji">🥛</span><br>
      <span style="font-size:0.82rem;color:var(--txt3)">...وهذه كلها ممنوعة في نظام طيبات! 🚫</span>
    </div>

    <!-- عداد العودة -->
    <div class="countdown-wrap">
      <div class="countdown-ring">
        <svg width="60" height="60" viewBox="0 0 60 60">
          <circle class="ring-bg" cx="30" cy="30" r="26"/>
          <circle class="ring-fill" id="ringFill" cx="30" cy="30" r="26"/>
        </svg>
        <div class="countdown-num" id="countNum">10</div>
      </div>
      <div class="countdown-text">
        <strong>سيتم توجيهك تلقائياً</strong><br>
        إلى موقع طيبات خلال ثوانٍ...
      </div>
    </div>

    <a href="https://tayyibat.online/" class="btn-home">
      🏠 عودة للصفحة الرئيسية
    </a>

  </div>
</div>

<script>
  // ─── نجوم الخلفية ───
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      --delay:${Math.random()*4}s;
      --op:${0.2+Math.random()*0.6};
      width:${1+Math.random()*2.5}px;
      height:${1+Math.random()*2.5}px;
    `;
    starsContainer.appendChild(s);
  }

  // ─── عداد العودة ───
  const TOTAL = 10;
  const CIRCUMFERENCE = 2 * Math.PI * 26; // ~163.4
  let timeLeft = TOTAL;
  const numEl = document.getElementById('countNum');
  const ringEl = document.getElementById('ringFill');

  ringEl.style.strokeDasharray = CIRCUMFERENCE;
  ringEl.style.strokeDashoffset = 0;

  const timer = setInterval(() => {
    timeLeft--;
    numEl.textContent = timeLeft;

    // تقليص الحلقة
    const offset = CIRCUMFERENCE * (1 - timeLeft / TOTAL);
    ringEl.style.strokeDashoffset = offset;

    // تحذير باللون الأحمر في آخر 3 ثوان
    if (timeLeft <= 3) {
      ringEl.style.stroke = '#ef5350';
      numEl.style.color = '#ef5350';
    }

    if (timeLeft <= 0) {
      clearInterval(timer);
      window.location.href = 'https://tayyibat.online/';
    }
  }, 1000);
</script>
</body>
</html>
